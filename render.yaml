services:
  - type: web
    name: mural-uniodonto
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@uniodonto.com
      - key: ADMIN_PASSWORD
        value: troque-esta-senha-123
      - key: PORT
        value: 10000