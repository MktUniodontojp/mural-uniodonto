services:
  - type: web
    name: mural-uniodonto
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    disk:
      name: mural-dados
      mountPath: /data-persistente
      sizeGB: 1
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@uniodonto.com
      - key: ADMIN_PASSWORD
        value: troque-esta-senha-123
      - key: PORT
        value: 10000
      - key: DATA_DIR
        value: /data-persistente
